name: Empty commit

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name secrets.MY_Name
          git config user.email secrets.MY_EMAIL

      - name: Create empty commit and push
        run: |
          git commit  -m "Refresh Website"
          git push
